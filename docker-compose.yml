version: "3.8"

# Self-hosted Convex backend stack — companion to the Next frontend.
# Frontend is built+deployed separately via Dockerfile (Next standalone).
# Required env (set in Dokploy / .env, never committed):
#   INSTANCE_NAME, INSTANCE_SECRET, CONVEX_ADMIN_KEY, JWT_PRIVATE_KEY, JWKS
#   POSTGRES_URL (postgresql://user:pass@host:5432/db) — REQUIRED for prod
#   S3_STORAGE_{EXPORTS,SNAPSHOT_IMPORTS,MODULES,FILES,SEARCH}_BUCKET (optional)
#   AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (if S3 used)

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:5143-7adfedc
    restart: unless-stopped
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWKS=${JWKS}
      - CONVEX_ADMIN_KEY=${CONVEX_ADMIN_KEY}
      - POSTGRES_URL=${POSTGRES_URL}
      - DISABLE_METRICS_ENDPOINT=${DISABLE_METRICS_ENDPOINT:-false}
      - REDACT_LOGS_TO_CLIENT=${REDACT_LOGS_TO_CLIENT:-true}
      - S3_STORAGE_EXPORTS_BUCKET=${S3_STORAGE_EXPORTS_BUCKET:-}
      - S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET=${S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET:-}
      - S3_STORAGE_MODULES_BUCKET=${S3_STORAGE_MODULES_BUCKET:-}
      - S3_STORAGE_FILES_BUCKET=${S3_STORAGE_FILES_BUCKET:-}
      - S3_STORAGE_SEARCH_BUCKET=${S3_STORAGE_SEARCH_BUCKET:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - convex_data:/convex/data
    ports:
      - "3210:3210"
      - "3211:3211"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3210/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:5143-7adfedc
    restart: unless-stopped
    environment:
      - PORT=6791
    ports:
      - "6791:6791"

volumes:
  convex_data:
